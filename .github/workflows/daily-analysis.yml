name: Daily Trading Analysis

on:
  # 13:00 UTC = 9 AM EDT (summer); 14:00 UTC = 9 AM EST (winter).
  # Both fire year-round; the dst-guard job exits early when NY local hour != 9.
  schedule:
    - cron: "0 13 * * 1-5"
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker to run (AAPL, MSFT, GOOGL, AMZN, NVDA, META, TSLA). Leave blank to run all."
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  schedule-guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install NYSE calendar
        run: pip install pandas-market-calendars
      - id: check
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scripts/check_should_run.py

  analyze:
    needs: schedule-guard
    if: needs.schedule-guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: AAPL,  symbol: AAPL }
          - { name: MSFT,  symbol: MSFT }
          - { name: GOOGL, symbol: GOOGL }
          - { name: AMZN,  symbol: AMZN }
          - { name: NVDA,  symbol: NVDA }
          - { name: META,  symbol: META }
          - { name: TSLA,  symbol: TSLA }
    steps:
      - name: Skip if manual run targeted a different ticker
        id: ticker-filter
        run: |
          REQUESTED="${{ github.event.inputs.ticker }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$REQUESTED" ] && [ "$REQUESTED" != "${{ matrix.name }}" ]; then
            echo "Skipping ${{ matrix.name }} (manual run requested $REQUESTED)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute NY date
        if: steps.ticker-filter.outputs.skip == 'false'
        id: nydate
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.ticker-filter.outputs.skip == 'false'

      - uses: actions/setup-python@v5
        if: steps.ticker-filter.outputs.skip == 'false'
        with:
          python-version: "3.13"
          cache: pip

      - name: Restore TradingAgents memory cache
        if: steps.ticker-filter.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.tradingagents
          key: tradingagents-memory-${{ matrix.name }}-${{ steps.nydate.outputs.date }}
          restore-keys: |
            tradingagents-memory-${{ matrix.name }}-

      - name: Install TradingAgents
        if: steps.ticker-filter.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Run analysis
        if: steps.ticker-filter.outputs.skip == 'false'
        id: analysis
        env:
          TICKER: ${{ matrix.symbol }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OUTPUT_FILE: decision.md
          RATING_FILE: rating.txt
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Secret OPENAI_API_KEY is not set."
            exit 1
          fi
          set +e
          python scripts/run_analysis.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Execute paper trade on Alpaca
        if: steps.ticker-filter.outputs.skip == 'false' && steps.analysis.outputs.exit_code == '0'
        id: trade
        continue-on-error: true
        env:
          TICKER: ${{ matrix.symbol }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          RATING_FILE: rating.txt
          TRADE_OUTPUT_FILE: trade.md
        run: python scripts/execute_trade.py

      - name: Build issue body (trade summary + decision)
        if: steps.ticker-filter.outputs.skip == 'false' && hashFiles('decision.md') != ''
        run: |
          : > issue_body.md
          if [ -f trade.md ]; then
            cat trade.md >> issue_body.md
            echo "" >> issue_body.md
            echo "---" >> issue_body.md
            echo "" >> issue_body.md
          fi
          cat decision.md >> issue_body.md

      - name: Create issue with decision
        if: steps.ticker-filter.outputs.skip == 'false' && hashFiles('decision.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ steps.analysis.outputs.exit_code == '0' && 'OK' || 'FAILED' }}
        run: |
          TITLE="📈 ${{ matrix.name }} — ${{ steps.nydate.outputs.date }} ($STATUS)"
          gh label create "ticker:${{ matrix.name }}" --color "0E8A16" --force 2>/dev/null || true
          gh label create "daily-analysis"           --color "5319E7" --force 2>/dev/null || true
          gh issue create \
            --title "$TITLE" \
            --body-file issue_body.md \
            --label "ticker:${{ matrix.name }}" \
            --label "daily-analysis"

      - name: Upload decision artifact
        if: steps.ticker-filter.outputs.skip == 'false' && hashFiles('decision.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: decision-${{ matrix.name }}-${{ steps.nydate.outputs.date }}
          path: decision.md
          retention-days: 30

      - name: Upload TradingAgents state (memory log + per-run JSONs)
        if: always() && steps.ticker-filter.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: tradingagents-state-${{ matrix.name }}-${{ steps.nydate.outputs.date }}
          path: ~/.tradingagents/
          retention-days: 30
          if-no-files-found: warn

      - name: Fail job if analysis failed
        if: steps.ticker-filter.outputs.skip == 'false' && steps.analysis.outputs.exit_code != '0'
        run: exit 1
